spring:
  application:
    name: payment-intelligence-agent
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      cloudwatch:
        enabled: false          # enabled via prod profile
        namespace: PIA
        step: PT1M              # push every minute
    tags:
      service: ${spring.application.name}
      env: ${spring.profiles.active:local}
  tracing:
    enabled: true
    sampling:
      probability: 1.0          # 100% in dev; reduce in prod
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces   # overridden in prod → ADOT sidecar

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha

pia:
  api:
    cors:
      allowed-origins: http://localhost:4200
  dynamodb:
    table-name: pia-table
  sqs:
    payment-events-queue: payment-events-queue
    payment-events-dlq: payment-events-dlq
    anomaly-analysis-queue: anomaly-analysis-queue
    anomaly-analysis-dlq: anomaly-analysis-dlq
  agent:
    trigger-min-severity: HIGH
  s3:
    reports-bucket: pia-reports
  ssm:
    claude-api-key-path: /pia/claude/api-key
  outbox:
    poll-interval-ms: 5000
  claude:
    api-key: placeholder   # overridden in application-local.yml or via SsmSecretsLoader (EnvironmentPostProcessor)
    base-url: https://api.anthropic.com
    model: claude-sonnet-4-6
    max-tokens: 2048
    max-iterations: 10
    system-prompt: >
      You are a payment fraud analyst. Use the available tools to gather context and always
      finish with compute_risk_score. Respond with ONLY a JSON object — no text outside it.
      Fields: "summary" (one sentence: risk level + score + main reason) and "analysis"
      (markdown, max 150 words, 3 sections max: Risk Score, Key Factors, Recommendation —
      bullet points only, no tables).
  detection:
    amount:
      high-threshold: 5000.00
      critical-threshold: 10000.00
    velocity:
      window-hours: 1
      high-count: 5
      critical-count: 10
    card-testing:
      window-hours: 1
      min-count: 3
      high-count: 5
      max-micro-amount: 2.00
    geo:
      high-risk-countries: AE,MT,SG,HK,RU,NG
