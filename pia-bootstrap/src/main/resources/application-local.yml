spring:
  cloud:
    aws:
      region:
        static: eu-west-1
      credentials:
        access-key: test
        secret-key: test
      dynamodb:
        endpoint: http://localhost:4566
      sqs:
        endpoint: http://localhost:4566
      s3:
        endpoint: http://localhost:4566
        path-style-access-enabled: true

# LocalStack SSM endpoint for SsmSecretsLoader
pia:
  aws:
    ssm:
      endpoint: http://localhost:4566
  claude:
    api-key: local-placeholder-key   # safe value for local dev; real key loaded from LocalStack SSM

management:
  tracing:
    enabled: false   # no OTLP collector running locally
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env

logging:
  level:
    com.aubin.pia: DEBUG
    io.awspring.cloud: INFO
