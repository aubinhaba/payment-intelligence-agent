spring:
  cloud:
    aws:
      region:
        static: ${AWS_REGION:eu-west-1}
      # Credentials resolved from ECS task role (no explicit config needed)

management:
  metrics:
    export:
      cloudwatch:
        enabled: true
        namespace: PIA
        step: PT1M
  tracing:
    enabled: false   # no ADOT sidecar in dev — saves cost
  otlp:
    tracing:
      export:
        enabled: false

logging:
  level:
    root: INFO
    com.aubin.pia: DEBUG
