spring:
  cloud:
    aws:
      region:
        static: ${AWS_REGION:eu-west-1}
      # Credentials resolved from ECS task role (no explicit config needed)

management:
  metrics:
    export:
      cloudwatch:
        enabled: true
        namespace: PIA
        step: PT1M
  tracing:
    sampling:
      probability: 0.1          # 10% sampling in prod to stay in Free Tier
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces   # AWS ADOT collector sidecar on ECS task

logging:
  level:
    root: WARN
    com.aubin.pia: INFO
