server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # Angular app — all routes to index.html (HTML5 routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api to the Spring Boot backend
    location /api/ {
        proxy_pass http://pia-bootstrap:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy /actuator to Spring Boot
    location /actuator/ {
        proxy_pass http://pia-bootstrap:8080/actuator/;
        proxy_set_header Host $host;
    }

    # Static assets — long cache
    location ~* \.(js|css|png|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
