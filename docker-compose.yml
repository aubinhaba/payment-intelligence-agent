services:
  localstack:
    image: localstack/localstack:3.8
    container_name: pia-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: dynamodb,sqs,s3,ssm
      DEFAULT_REGION: eu-west-1
      DEBUG: "0"
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 10s
      retries: 12

  pia-simulator:
    build:
      context: .
      dockerfile: pia-simulator/Dockerfile
    container_name: pia-simulator
    environment:
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      localstack:
        condition: service_healthy
    profiles:
      - simulator

volumes:
  localstack_data:
