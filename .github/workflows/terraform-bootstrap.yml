name: Terraform Bootstrap (dev)

on:
  workflow_dispatch:
    inputs:
      claude_api_key:
        description: 'Claude API key to store in SSM (leave empty to skip)'
        required: false
        default: ''

jobs:
  bootstrap:
    name: Bootstrap Terraform backend — dev
    runs-on: ubuntu-latest
    environment: dev
    env:
      AWS_REGION:   eu-west-1
      STATE_BUCKET: pia-terraform-state-dev
      LOCK_TABLE:   pia-terraform-locks

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-west-1

      - name: Create S3 state bucket
        run: |
          if aws s3api head-bucket --bucket "$STATE_BUCKET" 2>/dev/null; then
            echo "Bucket $STATE_BUCKET already exists — skipping"
          else
            aws s3api create-bucket \
              --bucket "$STATE_BUCKET" \
              --region "$AWS_REGION"
            aws s3api put-bucket-versioning \
              --bucket "$STATE_BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket "$STATE_BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block \
              --bucket "$STATE_BUCKET" \
              --public-access-block-configuration \
              BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
            echo "Bucket $STATE_BUCKET created."
          fi

      - name: Create DynamoDB lock table
        run: |
          if aws dynamodb describe-table --table-name "$LOCK_TABLE" --region "$AWS_REGION" 2>/dev/null; then
            echo "Table $LOCK_TABLE already exists — skipping"
          else
            aws dynamodb create-table \
              --table-name "$LOCK_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$AWS_REGION"
            aws dynamodb wait table-exists \
              --table-name "$LOCK_TABLE" \
              --region "$AWS_REGION"
            echo "Table $LOCK_TABLE created."
          fi

      - name: Store Claude API key in SSM
        if: ${{ github.event.inputs.claude_api_key != '' }}
        run: |
          aws ssm put-parameter \
            --name "/pia/dev/CLAUDE_API_KEY" \
            --value "${{ github.event.inputs.claude_api_key }}" \
            --type SecureString \
            --overwrite \
            --region "$AWS_REGION"
          echo "Claude API key stored in SSM."

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.9'

      - name: Terraform Init
        working-directory: terraform/environments/dev
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform/environments/dev
        run: terraform apply -auto-approve
        env:
          TF_VAR_alert_email: ""
          TF_VAR_image_tag:   "latest"
