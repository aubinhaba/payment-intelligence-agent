name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build & Unit Tests ────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and run unit tests
        run: mvn -B -ntp clean verify -DskipITs

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: "**/target/site/jacoco/"
          retention-days: 7

      - name: Upload Surefire reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: surefire-reports
          path: "**/target/surefire-reports/"
          retention-days: 3

  # ── OWASP Dependency-Check ────────────────────────────────────────────────
  owasp:
    name: OWASP Dependency Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run OWASP dependency check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: mvn -B -ntp verify -P security -DskipTests

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: "**/target/dependency-check/"
          retention-days: 30

  # ── Container Image Scan ──────────────────────────────────────────────────
  trivy:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build pia-core image (no push)
        run: |
          docker build -f pia-bootstrap/Dockerfile -t pia-core:scan .

      - name: Scan pia-core with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: pia-core:scan
          format: sarif
          output: trivy-core.sarif
          severity: HIGH,CRITICAL
          trivyignores: .trivyignore
          exit-code: '1'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-core.sarif

  # ── Terraform Security ────────────────────────────────────────────────────
  tfsec:
    name: tfsec Terraform Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          additional_args: --config-file ../.tfsec.yml

  # ── Deploy to dev (main branch only) ──────────────────────────────────────
  deploy-dev:
    name: Deploy to dev
    runs-on: ubuntu-latest
    needs: [build, owasp, trivy, tfsec]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-west-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push pia-core
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:     ${{ github.sha }}
        run: |
          docker build -f pia-bootstrap/Dockerfile \
            -t $ECR_REGISTRY/pia-dev-pia-core:$IMAGE_TAG \
            -t $ECR_REGISTRY/pia-dev-pia-core:latest .
          docker push $ECR_REGISTRY/pia-dev-pia-core:$IMAGE_TAG
          docker push $ECR_REGISTRY/pia-dev-pia-core:latest

      - name: Build and push pia-simulator
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:     ${{ github.sha }}
        run: |
          docker build -f pia-simulator/Dockerfile \
            -t $ECR_REGISTRY/pia-dev-pia-simulator:$IMAGE_TAG \
            -t $ECR_REGISTRY/pia-dev-pia-simulator:latest .
          docker push $ECR_REGISTRY/pia-dev-pia-simulator:$IMAGE_TAG
          docker push $ECR_REGISTRY/pia-dev-pia-simulator:latest

      - name: Update ECS services
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws ecs update-service \
            --cluster pia-dev-cluster \
            --service pia-dev-pia-core \
            --force-new-deployment \
            --desired-count 1 \
            --region eu-west-1

          aws ecs update-service \
            --cluster pia-dev-cluster \
            --service pia-dev-pia-simulator \
            --force-new-deployment \
            --desired-count 1 \
            --region eu-west-1

      - name: Wait for services to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster pia-dev-cluster \
            --services pia-dev-pia-core pia-dev-pia-simulator \
            --region eu-west-1
